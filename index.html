<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Card Wallet Ultra</title>
    
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        :root { --primary: #007bff; --success: #28a745; --danger: #dc3545; --warning: #fd7e14; }
        body { font-family: sans-serif; text-align: center; padding: 0; margin: 0; background: #f0f2f5; }
        .container { max-width: 500px; margin: auto; padding: 15px; padding-bottom: 80px; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; }
        
        .logo-container { width: 50px; height: 50px; margin: 0 auto 10px; display: flex; align-items: center; justify-content: center; border-radius: 50%; overflow: hidden; color: white; background: var(--primary); font-weight: bold; }
        .logo-img { width: 80%; height: 80%; object-fit: contain; }
        
        #barcode-wrapper { background: white; padding: 10px; border-radius: 10px; min-height: 150px; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 1px solid #eee; }
        #barcode-canvas { max-width: 100%; height: auto; display: none; }
        #qrcode { display: none; padding: 10px; }
        #display-text { font-family: monospace; font-size: 1.2em; font-weight: bold; margin-top: 10px; word-break: break-all; }

        button { background: var(--success); color: white; border: none; padding: 12px; border-radius: 10px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }
        .btn-blue { background: var(--primary); }
        .btn-orange { background: var(--warning); }
        .btn-red { background: var(--danger); }
        .btn-small { padding: 5px 10px; width: auto; font-size: 12px; margin: 2px; }
        
        input, select { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .card-item { display: flex; align-items: center; padding: 10px; border-bottom: 1px solid #eee; cursor: pointer; text-align: left; }
        
        #map { height: 180px; width: 100%; border-radius: 10px; margin-top: 10px; display: none; border: 1px solid #ccc; }
        
        /* Modals & Scanner Overlay */
        #editModal, #scannerOverlay { display:none; position:fixed; z-index:2000; left:0; top:0; width:100%; height:100%; background:rgba(0,0,0,0.8); align-items:center; justify-content:center; }
        .modal-content { background:white; padding:20px; border-radius:20px; width:85%; max-width:380px; text-align: left; max-height: 85vh; overflow-y: auto; }
        #reader { width: 100%; max-width: 320px; background: white; border-radius: 10px; overflow: hidden; }
    </style>
</head>
<body>

<div class="container">
    <h2>📍 Slimme Kaarthouder</h2>
    
    <div class="card">
        <div id="main-logo-box"></div>
        <h3 id="store-name" style="margin: 5px 0;">Kies een kaart</h3>
        <div id="barcode-wrapper">
            <canvas id="barcode-canvas"></canvas>
            <div id="qrcode"></div>
            <div id="display-text"></div>
        </div>
        <p id="distance" style="font-size: 0.85em; color: #666; margin-top: 10px;"></p>
    </div>

    <div class="card">
        <button class="btn-blue" onclick="toggleAdd()">➕ Nieuwe Kaart</button>
        <div id="addForm" style="display:none; margin-top:15px; text-align: left;">
            <label>Winkelnaam</label><input type="text" id="newName" placeholder="Winkelnaam">
            <label>Code (Nummer of URL)</label><input type="text" id="newCode" placeholder="Scan of typ code">
            <button class="btn-orange" onclick="startScanner('newCode')">📷 Scan met Camera</button>
            <button onclick="saveCard()">💾 Opslaan</button>
        </div>
    </div>

    <h3>Mijn Kaarten</h3>
    <div id="card-list" class="card" style="padding: 5px;"></div>

    <div style="display: flex; gap: 10px;">
        <button class="btn-orange" onclick="downloadBackup()">📤 Backup</button>
        <button class="btn-blue" style="position: relative; overflow: hidden;">📥 Import 
            <input type="file" accept=".json" onchange="importBackup(event)" style="position:absolute; opacity:0; left:0; top:0; width:100%; height:100%; cursor:pointer;">
        </button>
    </div>
</div>

<div id="editModal">
    <div class="modal-content">
        <h3 style="margin-top:0">Aanpassen</h3>
        <label>Naam</label><input type="text" id="editName">
        <label>Scanner Data</label><input type="text" id="editCode">
        <label>Klantennummer</label><input type="text" id="editDisplay">
        <label>Type</label>
        <select id="editType"><option value="barcode">Barcode</option><option value="qrcode">QR-code</option></select>
        <label>Domein (bv. ah.nl)</label><input type="text" id="editDomain">
        <button class="btn-orange" onclick="startScanner('editCode')">📷 Nieuwe Scan</button>
        <button class="btn-orange" style="margin-top:10px;" onclick="initMap()">📍 Kies op kaart</button>
        <div id="map"></div>
        <button onclick="confirmEdit()" style="margin-top:15px;">💾 Opslaan</button>
        <button class="btn-red" onclick="closeEdit()">Annuleren</button>
    </div>
</div>

<div id="scannerOverlay">
    <div id="reader"></div>
    <button class="btn-red" onclick="stopScanner()" style="width: 200px; margin-top: 15px;">Sluiten</button>
</div>

<script>
    var cards = [];
    try { cards = JSON.parse(localStorage.getItem('myCards')) || []; } catch(e) { cards = []; }
    var currentEditIndex = null, map = null, marker = null, tempCoords = null, html5QrScanner = null;

    function getLogoHtml(card, size) {
        if (!card) return '';
        var letter = card.name ? card.name[0].toUpperCase() : '?';
        var logoUrl = card.domain ? "https://www.google.com/s2/favicons?sz=128&domain=" + card.domain : null;
        return '<div class="logo-container" style="width:'+size+'px; height:'+size+'px;">' +
            (logoUrl ? '<img src="'+logoUrl+'" class="logo-img" onerror="this.style.display=\'none\'; this.parentElement.innerHTML=\''+letter+'\'">' : letter) +
            '</div>';
    }

    function renderList() {
        var listDiv = document.getElementById('card-list');
        if (!listDiv) return;
        listDiv.innerHTML = cards.map(function(c, i) {
            return '<div class="card-item" onclick="showCard('+i+')">' +
                getLogoHtml(c, 40) +
                '<div style="flex-grow:1; margin-left:10px;"><b>'+(c.name || 'Naamloos')+'</b></div>' +
                '<button class="btn-blue btn-small" onclick="openEdit('+i+', event)">Edit</button>' +
                '<button class="btn-red btn-small" onclick="deleteCard('+i+', event)">X</button>' +
                '</div>';
        }).join('') || '<p>Geen kaarten gevonden.</p>';
    }

    function showCard(index) {
        var c = cards[index];
        if (!c) return;
        document.getElementById('store-name').innerText = c.name;
        document.getElementById('main-logo-box').innerHTML = getLogoHtml(c, 60);
        
        var canvas = document.getElementById('barcode-canvas');
        var qr = document.getElementById('qrcode');
        var txt = document.getElementById('display-text');
        
        canvas.style.display = 'none';
        qr.style.display = 'none'; qr.innerHTML = '';
        txt.innerText = c.displayNum || c.code;

        var clean = String(c.code).trim();
        if (c.type === 'qrcode') {
            qr.style.display = 'block';
            new QRCode(qr, { text: clean, width: 200, height: 200 });
        } else {
            canvas.style.display = 'block';
            try { JsBarcode(canvas, clean, { format: "CODE128", width: 2, height: 90, displayValue: false }); } 
            catch(e) { canvas.style.display='none'; qr.style.display='block'; qr.innerText="Fout"; }
        }
    }

    // SCANNER LOGICA
    function startScanner(targetId) {
        document.getElementById('scannerOverlay').style.display = 'flex';
        html5QrScanner = new Html5Qrcode("reader");
        html5QrScanner.start(
            { facingMode: "environment" }, 
            { fps: 10, qrbox: { width: 250, height: 250 } },
            function(decodedText) {
                document.getElementById(targetId).value = decodedText;
                stopScanner();
            }
        ).catch(function(err) { alert("Camera fout: " + err); stopScanner(); });
    }

    function stopScanner() {
        if (html5QrScanner) {
            html5QrScanner.stop().then(function() {
                document.getElementById('scannerOverlay').style.display = 'none';
            }).catch(function() {
                document.getElementById('scannerOverlay').style.display = 'none';
            });
        } else {
            document.getElementById('scannerOverlay').style.display = 'none';
        }
    }

    function toggleAdd() { var f = document.getElementById('addForm'); f.style.display = (f.style.display === 'none') ? 'block' : 'none'; }
    function saveCard() {
        var n = document.getElementById('newName').value, c = document.getElementById('newCode').value;
        if(n && c) { cards.push({name:n, code:c, type:'barcode'}); localStorage.setItem('myCards', JSON.stringify(cards)); location.reload(); }
    }
    function openEdit(index, e) {
        if(e) e.stopPropagation();
        currentEditIndex = index;
        var c = cards[index];
        document.getElementById('editName').value = c.name || '';
        document.getElementById('editCode').value = c.code || '';
        document.getElementById('editDisplay').value = c.displayNum || '';
        document.getElementById('editType').value = c.type || 'barcode';
        document.getElementById('editDomain').value = c.domain || '';
        document.getElementById('editModal').style.display = 'flex';
        tempCoords = c.lat ? {lat: c.lat, lng: c.lon} : null;
    }
    function confirmEdit() {
        var c = cards[currentEditIndex];
        c.name = document.getElementById('editName').value;
        c.code = document.getElementById('editCode').value;
        c.displayNum = document.getElementById('editDisplay').value;
        c.type = document.getElementById('editType').value;
        c.domain = document.getElementById('editDomain').value;
        if(tempCoords) { c.lat = tempCoords.lat; c.lon = tempCoords.lng; }
        localStorage.setItem('myCards', JSON.stringify(cards));
        location.reload();
    }
    function deleteCard(i, e) { if(e) e.stopPropagation(); if(confirm("Wissen?")){ cards.splice(i,1); localStorage.setItem('myCards', JSON.stringify(cards)); renderList(); } }
    function closeEdit() { document.getElementById('editModal').style.display='none'; if(map){map.remove(); map=null;} }
    function downloadBackup() { var a=document.createElement('a'); a.href="data:text/json;charset=utf-8,"+encodeURIComponent(JSON.stringify(cards)); a.download="backup.json"; a.click(); }
    function importBackup(e) { var r=new FileReader(); r.onload=function(ev){ cards=JSON.parse(ev.target.result); localStorage.setItem('myCards', JSON.stringify(cards)); location.reload(); }; r.readAsText(e.target.files[0]); }
    
    function initMap() {
        document.getElementById('map').style.display='block';
        var lat = (cards[currentEditIndex] && cards[currentEditIndex].lat) || 50.85;
        var lon = (cards[currentEditIndex] && cards[currentEditIndex].lon) || 4.35;
        if(!map) {
            map = L.map('map').setView([lat, lon], 12);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            marker = L.marker([lat, lon], {draggable:true}).addTo(map);
            map.on('click', function(e){ marker.setLatLng(e.latlng); tempCoords = e.latlng; });
        }
        setTimeout(function(){ map.invalidateSize(); }, 200);
    }

    document.addEventListener('DOMContentLoaded', function() {
        renderList();
        if (navigator.geolocation && cards.length > 0) {
            navigator.geolocation.getCurrentPosition(function(pos) {
                var closest = -1, minD = Infinity;
                cards.forEach(function(c, i) { if(c.lat) { var d = Math.sqrt(Math.pow(c.lat-pos.coords.latitude,2)+Math.pow(c.lon-pos.coords.longitude,2)); if(d<minD){minD=d; closest=i;} } });
                if(closest !== -1) showCard(closest);
            });
        }
    });
</script>
</body>
</html>
